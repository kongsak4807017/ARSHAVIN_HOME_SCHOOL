name: Append HB-12 source registers

on:
  push:
    branches: [automation/hb12-health-capstone]

permissions:
  contents: write

jobs:
  append-registers:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/hb12-health-capstone
      - name: Append HB-12 entries without replacing history
        shell: bash
        run: |
          if ! grep -q '^## HB-12 — Human Body and Health Capstone' CONTENT_SOURCES.md; then
            cat >> CONTENT_SOURCES.md <<'EOF'

## HB-12 — Human Body and Health Capstone
1. WHO — Making every school a health-promoting school: implementation guidance for school health services (published 2026-04-17; accessed 2026-07-21): https://www.who.int/publications/i/item/9789240115736 — supports whole-school, equitable, safe and coordinated health services.
2. WHO — Improving the health and wellbeing of children and adolescents: guidance on scheduled child and adolescent well-care visits (published 2024; accessed 2026-07-21): https://www.who.int/publications/i/item/9789240085336 — supports integrated attention to nutrition, safety, learning, connectedness, autonomy and family/community support.
3. WHO — Physical activity fact sheet (accessed 2026-07-21): https://www.who.int/news-room/fact-sheets/detail/physical-activity — supports age-appropriate movement as one part of health and well-being.
4. WHO — Self-care for health and well-being (updated 2026-06-03; accessed 2026-07-21): https://www.who.int/news-room/fact-sheets/detail/self-care-health-interventions — supports balanced routines, healthy diet, physical activity, sleep and supportive relationships while retaining professional care when needed.
5. UNESCO — Education for health and well-being (accessed 2026-07-21): https://www.unesco.org/en/health-education — supports age-appropriate, rights-based health learning, dignity and respectful help-seeking.
6. UNICEF — Convention on the Rights of the Child and personal-data protection (accessed 2026-07-21): https://www.unicef.org/child-rights-convention/convention-text and https://www.unicef.org/legal/data-protection — supports privacy, dignity, safeguarding and minimum necessary information.
7. W3C — WCAG 2.2 (accessed 2026-07-21): https://www.w3.org/TR/WCAG22/ — supports keyboard operation, semantic controls, visible focus and non-drag alternatives.
EOF
          fi
          if ! grep -q 'Complete interactive lesson \*\*HB-12' CHANGELOG.md; then
            cat >> CHANGELOG.md <<'EOF'

## 2026-07-21 — Final Grade 4 interactive-web completion

### Added
- Complete interactive lesson **HB-12 โครงงานสุขภาพและร่างกายแบบบูรณาการ / Human Body and Health Capstone**.
- Keyboard-native WHOLE systems canvas and responsible health-plan workflow with corrective bilingual feedback.
- Explicit no-diagnosis, no-personal-health-record, no-body-comparison and no-forced-disclosure safeguards.
- Exactly two print-ready A4 worksheet pages and a 60–90-minute teacher guide with answer guidance, accessibility alternatives, safeguarding gate and four-level rubric.
- Focused `tests/hb12-static-checks.mjs` and final complete regression coverage.

### Changed
- Homepage, shared learning shell and local progress reset now cover all **52 lessons**.
- Service-worker cache advanced to `arshavin-grade4-v53` with HB-12 lesson, script, worksheet and guide precached.
- Completion counters advanced to **52/52 lessons, 104/104 A4 worksheets and 51 complete teacher guides**.
- All five Grade 4 subject sequences are complete at source level.

### Verification boundary
- Static source and CI evidence are recorded; browser/device, assistive-technology, physical-print, published GitHub Pages and offline-reload verification remain pending until directly tested.
EOF
          fi
      - name: Commit appended registers
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CONTENT_SOURCES.md CHANGELOG.md
          git commit -m 'docs: append HB-12 source and changelog registers'
          git push origin HEAD:automation/hb12-health-capstone
