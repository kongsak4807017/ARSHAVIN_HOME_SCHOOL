name: Static learning-site checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run all static suites and capture evidence
        shell: bash
        run: |
          status=0
          node tests/static-checks.mjs > complete-static.log 2>&1 || status=1
          node tests/env02-static-checks.mjs > env02-static.log 2>&1 || status=1
          node tests/maker02-static-checks.mjs > maker02-static.log 2>&1 || status=1
          node tests/cit02-static-checks.mjs > cit02-static.log 2>&1 || status=1
          node tests/hb04-static-checks.mjs > hb04-static.log 2>&1 || status=1
          node tests/ai03-static-checks.mjs > ai03-static.log 2>&1 || status=1
          node tests/env03-static-checks.mjs > env03-static.log 2>&1 || status=1
          node tests/maker03-static-checks.mjs > maker03-static.log 2>&1 || status=1
          node tests/cit03-static-checks.mjs > cit03-static.log 2>&1 || status=1
          node tests/hb05-static-checks.mjs > hb05-static.log 2>&1 || status=1
          node tests/ai04-static-checks.mjs > ai04-static.log 2>&1 || status=1
          node tests/env04-static-checks.mjs > env04-static.log 2>&1 || status=1
          node tests/maker04-static-checks.mjs > maker04-static.log 2>&1 || status=1
          node tests/cit04-static-checks.mjs > cit04-static.log 2>&1 || status=1
          node tests/hb06-static-checks.mjs > hb06-static.log 2>&1 || status=1
          node tests/ai05-static-checks.mjs > ai05-static.log 2>&1 || status=1
          node tests/env05-static-checks.mjs > env05-static.log 2>&1 || status=1
          node tests/maker05-static-checks.mjs > maker05-static.log 2>&1 || status=1
          echo "STATIC_STATUS=$status" >> "$GITHUB_ENV"
      - name: Upload static-check evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-check-evidence
          path: '*-static.log'
          if-no-files-found: error
          retention-days: 7
      - name: Enforce static-check results
        if: always()
        shell: bash
        run: |
          cat complete-static.log env02-static.log maker02-static.log cit02-static.log hb04-static.log ai03-static.log env03-static.log maker03-static.log cit03-static.log hb05-static.log ai04-static.log env04-static.log maker04-static.log cit04-static.log hb06-static.log ai05-static.log env05-static.log maker05-static.log
          test "${STATIC_STATUS:-1}" -eq 0
