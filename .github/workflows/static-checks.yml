name: Static learning-site checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run all static suites and capture evidence
        shell: bash
        run: |
          status=0
          node tests/static-checks.mjs > complete-static.log 2>&1 || status=1
          node tests/env02-static-checks.mjs > env02-static.log 2>&1 || status=1
          node tests/maker02-static-checks.mjs > maker02-static.log 2>&1 || status=1
          node tests/cit02-static-checks.mjs > cit02-static.log 2>&1 || status=1
          node tests/hb04-static-checks.mjs > hb04-static.log 2>&1 || status=1
          node tests/ai03-static-checks.mjs > ai03-static.log 2>&1 || status=1
          node tests/env03-static-checks.mjs > env03-static.log 2>&1 || status=1
          node tests/maker03-static-checks.mjs > maker03-static.log 2>&1 || status=1
          node tests/cit03-static-checks.mjs > cit03-static.log 2>&1 || status=1
          node tests/hb05-static-checks.mjs > hb05-static.log 2>&1 || status=1
          node tests/ai04-static-checks.mjs > ai04-static.log 2>&1 || status=1
          node tests/env04-static-checks.mjs > env04-static.log 2>&1 || status=1
          node tests/maker04-static-checks.mjs > maker04-static.log 2>&1 || status=1
          node tests/cit04-static-checks.mjs > cit04-static.log 2>&1 || status=1
          node tests/hb06-static-checks.mjs > hb06-static.log 2>&1 || status=1
          node tests/ai05-static-checks.mjs > ai05-static.log 2>&1 || status=1
          node tests/env05-static-checks.mjs > env05-static.log 2>&1 || status=1
          node tests/maker05-static-checks.mjs > maker05-static.log 2>&1 || status=1
          node tests/cit05-static-checks.mjs > cit05-static.log 2>&1 || status=1
          node tests/hb07-static-checks.mjs > hb07-static.log 2>&1 || status=1
          node tests/ai06-static-checks.mjs > ai06-static.log 2>&1 || status=1
          node tests/env06-static-checks.mjs > env06-static.log 2>&1 || status=1
          node tests/maker06-static-checks.mjs > maker06-static.log 2>&1 || status=1
          node tests/cit06-static-checks.mjs > cit06-static.log 2>&1 || status=1
          node tests/hb08-static-checks.mjs > hb08-static.log 2>&1 || status=1
          node tests/ai07-static-checks.mjs > ai07-static.log 2>&1 || status=1
          node tests/env07-static-checks.mjs > env07-static.log 2>&1 || status=1
          node tests/maker07-static-checks.mjs > maker07-static.log 2>&1 || status=1
          node tests/cit07-static-checks.mjs > cit07-static.log 2>&1 || status=1
          node tests/hb09-static-checks.mjs > hb09-static.log 2>&1 || status=1
          node tests/ai08-static-checks.mjs > ai08-static.log 2>&1 || status=1
          node tests/env08-static-checks.mjs > env08-static.log 2>&1 || status=1
          node tests/maker08-static-checks.mjs > maker08-static.log 2>&1 || status=1
          node tests/cit08-static-checks.mjs > cit08-static.log 2>&1 || status=1
          node tests/hb10-static-checks.mjs > hb10-static.log 2>&1 || status=1
          node tests/ai09-static-checks.mjs > ai09-static.log 2>&1 || status=1
          node tests/env09-static-checks.mjs > env09-static.log 2>&1 || status=1
          node tests/maker09-static-checks.mjs > maker09-static.log 2>&1 || status=1
          node tests/cit09-static-checks.mjs > cit09-static.log 2>&1 || status=1
          node tests/hb11-static-checks.mjs > hb11-static.log 2>&1 || status=1
          node tests/ai10-static-checks.mjs > ai10-static.log 2>&1 || status=1
          node tests/env10-static-checks.mjs > env10-static.log 2>&1 || status=1
          node tests/maker10-static-checks.mjs > maker10-static.log 2>&1 || status=1
          node tests/cit10-static-checks.mjs > cit10-static.log 2>&1 || status=1
          node tests/hb12-static-checks.mjs > hb12-static.log 2>&1 || status=1
          echo "STATIC_STATUS=$status" >> "$GITHUB_ENV"
      - name: Upload static-check evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-check-evidence
          path: '*-static.log'
          if-no-files-found: error
          retention-days: 7
      - name: Enforce static-check results
        if: always()
        shell: bash
        run: |
          cat complete-static.log env02-static.log maker02-static.log cit02-static.log hb04-static.log ai03-static.log env03-static.log maker03-static.log cit03-static.log hb05-static.log ai04-static.log env04-static.log maker04-static.log cit04-static.log hb06-static.log ai05-static.log env05-static.log maker05-static.log cit05-static.log hb07-static.log ai06-static.log env06-static.log maker06-static.log cit06-static.log hb08-static.log ai07-static.log env07-static.log maker07-static.log cit07-static.log hb09-static.log ai08-static.log env08-static.log maker08-static.log cit08-static.log hb10-static.log ai09-static.log env09-static.log maker09-static.log cit09-static.log hb11-static.log ai10-static.log env10-static.log maker10-static.log cit10-static.log hb12-static.log
          test "${STATIC_STATUS:-1}" -eq 0
      - name: Append HB-12 central registers once
        if: success() && github.actor != 'github-actions[bot]' && github.head_ref == 'automation/hb12-health-capstone'
        shell: bash
        run: |
          if ! grep -q '^## HB-12 — Human Body and Health Capstone' CONTENT_SOURCES.md; then
            cat >> CONTENT_SOURCES.md <<'EOF'

## HB-12 — Human Body and Health Capstone
1. WHO — Making every school a health-promoting school: implementation guidance for school health services (published 2026-04-17; accessed 2026-07-21): https://www.who.int/publications/i/item/9789240115736 — supports whole-school, equitable, safe and coordinated health services.
2. WHO — Improving the health and wellbeing of children and adolescents: guidance on scheduled child and adolescent well-care visits (published 2024; accessed 2026-07-21): https://www.who.int/publications/i/item/9789240085336 — supports integrated attention to nutrition, safety, learning, connectedness, autonomy and family/community support.
3. WHO — Physical activity fact sheet (accessed 2026-07-21): https://www.who.int/news-room/fact-sheets/detail/physical-activity — supports age-appropriate movement as one part of health and well-being.
4. WHO — Self-care for health and well-being (updated 2026-06-03; accessed 2026-07-21): https://www.who.int/news-room/fact-sheets/detail/self-care-health-interventions — supports balanced routines, healthy diet, physical activity, sleep and supportive relationships while retaining professional care when needed.
5. UNESCO — Education for health and well-being (accessed 2026-07-21): https://www.unesco.org/en/health-education — supports age-appropriate, rights-based health learning, dignity and respectful help-seeking.
6. UNICEF — Convention on the Rights of the Child and personal-data protection (accessed 2026-07-21): https://www.unicef.org/child-rights-convention/convention-text and https://www.unicef.org/legal/data-protection — supports privacy, dignity, safeguarding and minimum necessary information.
7. W3C — WCAG 2.2 (accessed 2026-07-21): https://www.w3.org/TR/WCAG22/ — supports keyboard operation, semantic controls, visible focus and non-drag alternatives.
EOF
          fi
          if ! grep -q 'Complete interactive lesson \*\*HB-12' CHANGELOG.md; then
            cat >> CHANGELOG.md <<'EOF'

## 2026-07-21 — Final Grade 4 interactive-web completion

### Added
- Complete interactive lesson **HB-12 โครงงานสุขภาพและร่างกายแบบบูรณาการ / Human Body and Health Capstone**.
- Keyboard-native WHOLE systems canvas and responsible health-plan workflow with corrective bilingual feedback.
- Explicit no-diagnosis, no-personal-health-record, no-body-comparison and no-forced-disclosure safeguards.
- Exactly two print-ready A4 worksheet pages and a 60–90-minute teacher guide with answer guidance, accessibility alternatives, safeguarding gate and four-level rubric.
- Focused `tests/hb12-static-checks.mjs` and final complete regression coverage.

### Changed
- Homepage, shared learning shell and local progress reset now cover all **52 lessons**.
- Service-worker cache advanced to `arshavin-grade4-v53` with HB-12 lesson, script, worksheet and guide precached.
- Completion counters advanced to **52/52 lessons, 104/104 A4 worksheets and 51 complete teacher guides**.
- All five Grade 4 subject sequences are complete at source level.

### Verification boundary
- Static source and CI evidence are recorded; browser/device, assistive-technology, physical-print, published GitHub Pages and offline-reload verification remain pending until directly tested.
EOF
          fi
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CONTENT_SOURCES.md CHANGELOG.md
          git commit -m 'docs: append HB-12 source and changelog registers'
          git push origin HEAD:${{ github.head_ref }}
