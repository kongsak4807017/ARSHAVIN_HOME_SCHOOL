name: Static learning-site checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run dependency-free static checks
        run: |
          node tests/static-checks.mjs
          node tests/env02-static-checks.mjs
          node tests/maker02-static-checks.mjs
